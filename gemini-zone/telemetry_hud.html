<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veloce Telemetry HUD Prototype</title>
    <style>
        :root {
            --bg-base: #030712;
            --bg-panel: rgba(17, 24, 39, 0.4);
            --border-glow: rgba(56, 189, 248, 0.3);
            --neon-blue: #38bdf8;
            --neon-red: #f43f5e;
            --neon-green: #10b981;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-image:
                radial-gradient(circle at 50% 0%, rgba(56, 189, 248, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 50% 100%, rgba(244, 63, 94, 0.1) 0%, transparent 50%);
        }

        /* Grid Background Pattern */
        .grid-bg {
            position: absolute;
            inset: 0;
            background-size: 50px 50px;
            background-image: linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            z-index: -1;
            transform: perspective(500px) rotateX(60deg) translateY(-100px) translateZ(-200px);
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% {
                transform: perspective(500px) rotateX(60deg) translateY(0) translateZ(-200px);
            }

            100% {
                transform: perspective(500px) rotateX(60deg) translateY(50px) translateZ(-200px);
            }
        }

        .hud-container {
            width: 1400px;
            height: 800px;
            display: grid;
            grid-template-columns: 300px 1fr 300px;
            grid-template-rows: auto 1fr auto;
            gap: 24px;
            padding: 32px;
            position: relative;
        }

        /* Glassmorphism Panels */
        .panel {
            background: var(--bg-panel);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        .panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--neon-blue), transparent);
            opacity: 0.5;
        }

        /* Header */
        .header {
            grid-column: 1 / -1;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 4px;
            text-transform: uppercase;
            background: linear-gradient(to right, #fff, var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 600;
            color: var(--neon-green);
            text-shadow: 0 0 10px rgba(16, 185, 129, 0.5);
        }

        .dot {
            width: 8px;
            height: 8px;
            background-color: var(--neon-green);
            border-radius: 50%;
            box-shadow: 0 0 12px var(--neon-green);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.5;
                transform: scale(1.2);
            }

            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Data Readouts */
        .data-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .data-value {
            font-size: 42px;
            font-weight: 300;
            font-variant-numeric: tabular-nums;
            display: flex;
            align-items: baseline;
            gap: 8px;
        }

        .data-unit {
            font-size: 16px;
            color: var(--neon-blue);
            font-weight: 600;
        }

        .data-value.danger .data-unit {
            color: var(--neon-red);
        }

        .metric-group {
            margin-bottom: 32px;
        }

        /* Graph visualization */
        .mini-graph {
            height: 60px;
            width: 100%;
            display: flex;
            align-items: flex-end;
            gap: 2px;
            margin-top: 12px;
        }

        .bar {
            flex: 1;
            background: var(--neon-blue);
            border-radius: 2px 2px 0 0;
            opacity: 0.7;
            transition: height 0.1s ease-out;
            min-height: 5%;
        }

        /* Center Stage - 3D Car Wireframe Simulation */
        .center-stage {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .car-container {
            position: relative;
            width: 400px;
            height: 200px;
            perspective: 800px;
            margin-bottom: 40px;
        }

        .car-wireframe {
            position: absolute;
            inset: 0;
            border: 2px solid var(--neon-blue);
            border-radius: 100px 100px 20px 20px;
            transform-style: preserve-3d;
            animation: rotateCar 10s linear infinite;
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.2), inset 0 0 30px rgba(56, 189, 248, 0.2);
            background: rgba(56, 189, 248, 0.02);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .car-wireframe::before {
            content: '';
            position: absolute;
            width: 80%;
            height: 60%;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 40px 40px 10px 10px;
            transform: translateZ(20px);
        }

        .car-wireframe::after {
            content: '';
            position: absolute;
            width: 90%;
            height: 80%;
            border: 1px dashed var(--neon-blue);
            border-radius: 60px 60px 15px 15px;
            transform: translateZ(-20px);
            opacity: 0.3;
        }

        .wheel {
            position: absolute;
            width: 60px;
            height: 60px;
            border: 2px solid var(--neon-blue);
            border-radius: 50%;
            bottom: -20px;
            transform-style: preserve-3d;
            box-shadow: 0 0 15px var(--neon-blue);
        }

        .wheel::after {
            content: '';
            position: absolute;
            inset: 10px;
            border: 2px dashed rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .wheel.front {
            left: 40px;
        }

        .wheel.rear {
            right: 40px;
        }

        @keyframes rotateCar {
            0% {
                transform: rotateY(0deg) rotateX(10deg);
            }

            100% {
                transform: rotateY(360deg) rotateX(10deg);
            }
        }

        @keyframes spin {
            100% {
                transform: rotateZ(360deg);
            }
        }

        /* G-Force Meter (Center Bottom) */
        .g-force-meter {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 2px dashed rgba(255, 255, 255, 0.1);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.05) 0%, transparent 70%);
        }

        .g-force-crosshair {
            position: absolute;
            width: 100%;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
        }

        .g-force-crosshair.vert {
            width: 1px;
            height: 100%;
        }

        .g-dot {
            width: 16px;
            height: 16px;
            background: var(--neon-red);
            border-radius: 50%;
            position: absolute;
            box-shadow: 0 0 20px var(--neon-red);
            transition: transform 0.1s ease-out;
            z-index: 10;
        }

        .g-label {
            position: absolute;
            font-size: 10px;
            color: var(--text-muted);
            letter-spacing: 2px;
        }

        .g-label.top {
            top: -20px;
        }

        .g-label.bottom {
            bottom: -20px;
        }

        .g-label.left {
            left: -30px;
        }

        .g-label.right {
            right: -30px;
        }
    </style>
</head>

<body>

    <div class="grid-bg"></div>

    <div class="hud-container">

        <!-- Header -->
        <div class="header">
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--neon-blue)" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
                </svg>
                VELOCE TELEMETRY
            </div>
            <div class="status-indicator">
                <div class="dot"></div>
                LIVE SYSTEM LINK
            </div>
        </div>

        <!-- Left Panel: Engine & Speed -->
        <div class="panel">
            <div class="metric-group">
                <div class="data-label">Current Speed</div>
                <div class="data-value" id="speed-val">000 <span class="data-unit">km/h</span></div>
                <div class="mini-graph" id="speed-graph"></div>
            </div>

            <div class="metric-group">
                <div class="data-label">Engine RPM</div>
                <div class="data-value" id="rpm-val">0000 <span class="data-unit">RPM</span></div>
                <div class="mini-graph" id="rpm-graph"></div>
            </div>

            <div class="metric-group">
                <div class="data-label">Gear</div>
                <div class="data-value"
                    style="font-size: 64px; color: var(--neon-blue); text-shadow: 0 0 20px rgba(56,189,248,0.5);"
                    id="gear-val">N</div>
            </div>
        </div>

        <!-- Center Panel: 3D Visualization -->
        <div class="center-stage">
            <div class="car-container">
                <div class="car-wireframe">
                    <div class="wheel front"></div>
                    <div class="wheel rear"></div>
                </div>
            </div>

            <div class="data-label" style="margin-bottom: 24px;">Dynamic G-Force Vector</div>
            <div class="g-force-meter">
                <div class="g-force-crosshair"></div>
                <div class="g-force-crosshair vert"></div>
                <div class="g-dot" id="g-dot"></div>
                <div class="g-label top">+1G ACCEL</div>
                <div class="g-label bottom">-1G BRAKE</div>
                <div class="g-label left">+1G LEFT</div>
                <div class="g-label right">-1G RIGHT</div>
            </div>
        </div>

        <!-- Right Panel: Thermals & Pressure -->
        <div class="panel">
            <div class="metric-group">
                <div class="data-label">Core Temp</div>
                <div class="data-value" id="temp-val">90 <span class="data-unit">°C</span></div>
                <!-- Progress bar style -->
                <div
                    style="width: 100%; height: 4px; background: rgba(255,255,255,0.1); margin-top: 12px; border-radius: 2px; overflow: hidden;">
                    <div id="temp-bar"
                        style="height: 100%; width: 50%; background: var(--neon-blue); transition: all 0.2s;"></div>
                </div>
            </div>

            <div class="metric-group">
                <div class="data-label">Oil Pressure</div>
                <div class="data-value" id="oil-val">4.2 <span class="data-unit">BAR</span></div>
            </div>

            <div class="metric-group" style="margin-top: 60px;">
                <div class="data-label">Diagnostics</div>
                <div style="font-family: monospace; font-size: 12px; color: var(--neon-green); line-height: 1.8; opacity: 0.8;"
                    id="console-log">
                    > INITIATING HANDSHAKE... OK<br>
                    > ECU CALIBRATION... DONE<br>
                    > AERO SENSORS... ACTIVE<br>
                    > TRACTION CTRL... T1<br>
                </div>
            </div>
        </div>

    </div>

    <script>
        // Simulation Data State
        let state = {
            speed: 0,
            targetSpeed: 0,
            rpm: 800,
            gear: 1,
            throttle: 0,
            brake: 0,
            gForce: { x: 0, y: 0 },
            temp: 90
        };

        // DOM Elements
        const elSpeed = document.getElementById('speed-val');
        const elRpm = document.getElementById('rpm-val');
        const elGear = document.getElementById('gear-val');
        const elTemp = document.getElementById('temp-val');
        const elTempBar = document.getElementById('temp-bar');
        const elGDot = document.getElementById('g-dot');
        const elConsole = document.getElementById('console-log');

        // Initialize graphs
        function createGraphBoxes(containerId, count) {
            const container = document.getElementById(containerId);
            for (let i = 0; i < count; i++) {
                const bar = document.createElement('div');
                bar.className = 'bar';
                container.appendChild(bar);
            }
        }
        createGraphBoxes('speed-graph', 30);
        createGraphBoxes('rpm-graph', 30);

        function updateGraph(containerId, percentage, color) {
            const container = document.getElementById(containerId);
            const bars = container.children;
            // Shift all bars left logically
            for (let i = 0; i < bars.length - 1; i++) {
                bars[i].style.height = bars[i + 1].style.height;
                bars[i].style.background = bars[i + 1].style.background;
            }
            // Set newest bar
            const lastBar = bars[bars.length - 1];
            lastBar.style.height = `${Math.max(5, percentage)}%`;
            if (color) lastBar.style.background = color;
        }

        // Logic Loop
        setInterval(() => {
            // Randomize target speed to simulate driving
            if (Math.random() < 0.05) {
                state.targetSpeed = Math.floor(Math.random() * 280);
            }

            // Smooth approach to target speed
            const diff = state.targetSpeed - state.speed;
            state.speed += diff * 0.05;

            // Calculate Gear & RPM based on speed
            const maxSpeed = 320;
            const maxRpm = 9000;
            const idleRpm = 800;

            let targetGear = Math.max(1, Math.ceil((state.speed / maxSpeed) * 7));
            if (state.speed < 5) targetGear = 1;
            state.gear = targetGear;

            // Simplified RPM curve per gear
            const gearSpeedRange = maxSpeed / 7;
            const speedInCurrentGear = state.speed - ((state.gear - 1) * gearSpeedRange);
            const rpmPercentage = speedInCurrentGear / gearSpeedRange;

            state.rpm = idleRpm + (rpmPercentage * (maxRpm - idleRpm));
            // Add some noise to RPM
            state.rpm += (Math.random() * 200 - 100);
            if (state.rpm > maxRpm) state.rpm = maxRpm;
            if (state.rpm < idleRpm) state.rpm = idleRpm;

            // Calculate simulated G-Force
            // Y axis (Accel/Brake)
            const acceleration = diff;
            state.gForce.y = -(acceleration * 0.05); // Negative = up (Accel)
            // X axis (Turning)
            if (state.speed > 50) {
                state.gForce.x += (Math.random() * 0.4 - 0.2);
                state.gForce.x *= 0.9; // Return to center
            } else {
                state.gForce.x = 0;
            }

            // Engine Temp based on RPM
            state.temp += (state.rpm > 6000 ? 0.05 : -0.05);
            if (state.temp < 85) state.temp = 85;
            if (state.temp > 115) state.temp = 115;

            // DOM Updates
            elSpeed.innerHTML = `${Math.floor(state.speed).toString().padStart(3, '0')} <span class="data-unit">km/h</span>`;

            // RPM Redline logic
            const isRedline = state.rpm > 8000;
            const colorRpm = isRedline ? 'var(--neon-red)' : 'var(--neon-blue)';
            elRpm.innerHTML = `<span style="color: ${colorRpm}">${Math.floor(state.rpm).toString().padStart(4, '0')}</span> <span class="data-unit">RPM</span>`;

            elGear.textContent = state.speed < 2 ? 'N' : state.gear;

            elTemp.innerHTML = `${state.temp.toFixed(1)} <span class="data-unit">°C</span>`;
            const tempPerc = ((state.temp - 80) / 40) * 100;
            elTempBar.style.width = `${tempPerc}%`;
            elTempBar.style.background = state.temp > 105 ? 'var(--neon-red)' : (state.temp > 95 ? '#fbbf24' : 'var(--neon-blue)');

            // G-Force Dot Position (Max +/- 80px from center)
            const gX = Math.max(-80, Math.min(80, state.gForce.x * 40));
            const gY = Math.max(-80, Math.min(80, state.gForce.y * 40));
            elGDot.style.transform = `translate(${gX}px, ${gY}px)`;

            // Update graphs
            updateGraph('speed-graph', (state.speed / maxSpeed) * 100);
            updateGraph('rpm-graph', (state.rpm / maxRpm) * 100, colorRpm);

        }, 50);

        // Fake console logs
        const logs = [
            "ADJUSTING BRAKE BIAS: R40 / F60",
            "AERO PROFILES: SPORT MODE",
            "BATTERY REGEN: ACTIVE",
            "TYRE TEMP: OPTIMAL",
            "DOWNFORCE: +120kg",
            "SUSPENSION: STIFF"
        ];
        setInterval(() => {
            const currentHtml = elConsole.innerHTML.split('<br>');
            currentHtml.shift(); // remove first line
            currentHtml.push(`> ${logs[Math.floor(Math.random() * logs.length)]}`);
            elConsole.innerHTML = currentHtml.join('<br>');
        }, 3000);

    </script>
</body>

</html>
